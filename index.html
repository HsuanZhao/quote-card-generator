<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>名言卡片 · AI / 法律</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --paper:#EEEBE4;
  --ink:#171613;
  --panel:#F8F6F0;
  --line:#DAD5C8;
  --accent:#2B5CE0;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{min-height:100%; background:var(--paper); font-family:"Noto Sans SC","Helvetica Neue",Arial,sans-serif; color:var(--ink);}
body{display:flex; flex-direction:column; align-items:center; padding:48px 24px 90px;}

.masthead{width:100%; max-width:1220px; display:flex; align-items:baseline; justify-content:space-between; border-bottom:1px solid var(--line); padding-bottom:18px; margin-bottom:40px;}
.masthead h1{font-family:"Noto Serif SC",serif; font-size:22px; font-weight:700; letter-spacing:.04em;}
.masthead span{font-size:11px; letter-spacing:.24em; color:#8a8375; text-transform:uppercase;}

.workspace{width:100%; max-width:1220px; display:grid; grid-template-columns:360px 1fr; gap:44px; align-items:start;}
@media (max-width:880px){.workspace{grid-template-columns:1fr;}}

/* ---- panel ---- */
.panel{background:var(--panel); border:1px solid var(--line); padding:28px 26px;}
.field{margin-bottom:22px;}
.field label{display:block; font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:#8a8375; margin-bottom:8px;}
.field textarea, .field input{width:100%; border:none; border-bottom:1px solid var(--line); background:transparent; font-family:"Noto Serif SC",serif; font-size:15px; color:var(--ink); padding:6px 2px; resize:none; outline:none; transition:border-color .2s;}
.field textarea{min-height:86px; line-height:1.7;}
.field textarea:focus, .field input:focus{border-color:var(--accent);}

.category-tabs{display:flex; gap:0; margin-bottom:22px; border:1px solid var(--ink);}
.cat-btn{flex:1; padding:12px 0; text-align:center; background:transparent; border:none; font-size:12px; letter-spacing:.14em; cursor:pointer; color:var(--ink);}
.cat-btn.active{background:var(--ink); color:var(--panel);}
.cat-btn+.cat-btn{border-left:1px solid var(--ink);}

.theme-set{display:none;}
.theme-set.active{display:block;}
.theme-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px;}
.theme-swatch{height:64px; border:1px solid var(--line); cursor:pointer; position:relative; transition:transform .15s;}
.theme-swatch:hover{transform:translateY(-2px);}
.theme-swatch.active{border-color:var(--ink); box-shadow:0 0 0 1px var(--ink);}
.theme-swatch.active::after{content:'✓'; position:absolute; top:5px; right:7px; color:#fff; font-size:10px;}
.theme-name{font-size:10.5px; color:#6b6558; margin-top:6px; text-align:center; letter-spacing:.04em;}

.mark-toggle{display:flex; gap:10px;}
.mark-btn{flex:1; padding:10px 0; text-align:center; border:1px solid var(--line); background:transparent; font-size:11px; letter-spacing:.08em; cursor:pointer; color:#6b6558;}
.mark-btn.active{background:var(--ink); color:var(--panel); border-color:var(--ink);}

.export-btn{width:100%; margin-top:6px; padding:15px 0; background:var(--ink); color:var(--panel); border:none; font-size:12px; letter-spacing:.16em; text-transform:uppercase; cursor:pointer; transition:opacity .2s;}
.export-btn:hover{opacity:.85;}
.hint{font-size:10.5px; color:#a39d8f; margin-top:10px; line-height:1.6;}

/* ---- stage ---- */
.stage{display:flex; justify-content:center;}
.card-frame{width:450px; aspect-ratio:3/4; position:relative; box-shadow:0 30px 60px -20px rgba(0,0,0,0.35), 0 2px 6px rgba(0,0,0,0.08);}

.card{width:100%; height:100%; position:relative; overflow:hidden; display:flex; flex-direction:column; justify-content:space-between; padding:42px 40px 36px;}
.card .frame-line{position:absolute; inset:14px; border:1px solid; pointer-events:none;}
.card .eyebrow{font-size:10px; letter-spacing:.28em; text-transform:uppercase; z-index:2;}
.card .quote-zone{flex:1; display:flex; flex-direction:column; justify-content:center; position:relative; z-index:2; padding:16px 0;}
.card .quote-text{font-size:25px; line-height:1.62; outline:none; word-break:break-word;}
.card .footer{z-index:2; display:flex; align-items:flex-end; justify-content:space-between;}
.card .attribution .rule{width:32px; height:1px; margin-bottom:12px;}
.card .author{font-size:16px; font-weight:700; letter-spacing:.03em; outline:none;}
.card .role{font-size:10px; letter-spacing:.1em; margin-top:5px; outline:none; opacity:.7;}
.card .badge{flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px;}

/* ============================================================
   AI 科技 主题
   ============================================================ */

/* --- 主题：暗夜矩阵 --- */
.card.theme-matrix{
  background:
    linear-gradient(155deg,#0A0C10,#050608 70%);
  color:#DCE6EC;
  font-family:"Noto Sans SC",sans-serif;
}
.theme-matrix::before{
  content:'';
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(60,230,220,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(60,230,220,0.06) 1px, transparent 1px);
  background-size:26px 26px;
  z-index:1;
}
.theme-matrix .frame-line{border-color:rgba(60,230,220,0.25);}
.theme-matrix .eyebrow{color:#3CE6DC; font-family:"Courier New",monospace;}
.theme-matrix .quote-text{color:#EAF4F2; font-weight:500;}
.theme-matrix .quote-text::before{content:'{ '; color:#3CE6DC; opacity:.7;}
.theme-matrix .quote-text::after{content:' }'; color:#3CE6DC; opacity:.7;}
.theme-matrix .attribution .rule{background:#3CE6DC;}
.theme-matrix .author{color:#F2F8F7;}
.theme-matrix .role{color:#7C97A0; font-family:"Courier New",monospace;}
.theme-matrix .badge{width:52px; height:52px; border:1px solid #3CE6DC; color:#3CE6DC; font-family:"Courier New",monospace; clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);}

/* --- 主题：极简白皮书 --- */
.card.theme-blueprint{
  background:#F5F3EE;
  color:#14161A;
  font-family:"Noto Sans SC",sans-serif;
}
.theme-blueprint::before{
  content:'';
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(20,22,26,0.14) 1px, transparent 1px);
  background-size:16px 16px;
  z-index:1;
}
.theme-blueprint .frame-line{border-color:rgba(20,22,26,0.18);}
.theme-blueprint .eyebrow{color:#2B5CE0; font-family:"Courier New",monospace;}
.theme-blueprint .quote-text{color:#14161A; font-weight:600;}
.theme-blueprint .attribution .rule{background:#2B5CE0;}
.theme-blueprint .author{color:#14161A;}
.theme-blueprint .role{color:#6b6f77; font-family:"Courier New",monospace;}
.theme-blueprint .badge{width:52px; height:52px; border:1.5px solid #2B5CE0; color:#2B5CE0; font-family:"Courier New",monospace;}

/* ============================================================
   法律 主题
   ============================================================ */

/* --- 主题：卷宗黑金 --- */
.card.theme-dossier{
  background:
    radial-gradient(ellipse at 20% 0%, rgba(191,155,86,0.10), transparent 50%),
    linear-gradient(160deg,#151210,#0C0A08 70%);
  color:#E9E1CD;
  font-family:"Noto Serif SC",serif;
}
.theme-dossier .frame-line{border:1px solid rgba(191,155,86,0.4); inset:10px;}
.theme-dossier .eyebrow{color:#BF9B56; letter-spacing:.32em;}
.theme-dossier .quote-text{color:#F1E9D3; font-weight:400;}
.theme-dossier .attribution .rule{background:#BF9B56;}
.theme-dossier .author{color:#F1E9D3;}
.theme-dossier .role{color:#A79A78; font-family:"Noto Sans SC",sans-serif;}
.theme-dossier .badge{width:54px; height:54px; border-radius:50%; border:1px solid #BF9B56; color:#BF9B56; font-family:"Noto Serif SC",serif; font-size:18px;}

/* --- 主题：象牙判例 --- */
.card.theme-ivory{
  background:#F3EEE2;
  color:#221E17;
  font-family:"Noto Serif SC",serif;
}
.theme-ivory .frame-line{border-color:rgba(34,30,23,0.2);}
.theme-ivory::after{
  content:'';
  position:absolute; left:0; top:0; bottom:0; width:6px;
  background:#7A1F22;
  z-index:2;
}
.theme-ivory .eyebrow{color:#7A1F22; letter-spacing:.3em;}
.theme-ivory .quote-text{color:#1D1911; font-weight:500;}
.theme-ivory .attribution .rule{background:#7A1F22;}
.theme-ivory .author{color:#1D1911;}
.theme-ivory .role{color:#6b6255; font-family:"Noto Sans SC",sans-serif;}
.theme-ivory .badge{width:52px; height:52px; border:1px solid #7A1F22; color:#7A1F22; font-family:"Noto Serif SC",serif; font-size:18px;}

</style>
</head>
<body>

<div class="masthead">
  <h1>名言卡片工作室</h1>
  <span>AI Tech × Legal Edition · 3 : 4</span>
</div>

<div class="workspace">

  <!-- ============ CONTROL PANEL ============ -->
  <div class="panel">

    <div class="field">
      <label>引用 · Quote</label>
      <textarea id="inputQuote">预测未来最好的方式，就是把它创造出来。</textarea>
    </div>

    <div class="field">
      <label>作者 · Author</label>
      <input id="inputAuthor" value="艾伦·凯" />
    </div>

    <div class="field">
      <label>身份 / 出处 · Role</label>
      <input id="inputRole" value="ALAN KAY · 计算机科学家" />
    </div>

    <div class="field">
      <label>栏目编号 · Series Tag</label>
      <input id="inputSeries" value="SYS.LOG // 09" />
    </div>

    <div class="field">
      <label>所属圈层 · Category</label>
      <div class="category-tabs">
        <button class="cat-btn active" data-cat="ai">AI 科技</button>
        <button class="cat-btn" data-cat="law">法律</button>
      </div>

      <div class="theme-set active" id="set-ai">
        <div class="theme-grid">
          <div>
            <div class="theme-swatch active" data-theme="theme-matrix" style="background:linear-gradient(155deg,#0A0C10,#050608)"></div>
            <div class="theme-name">暗夜矩阵</div>
          </div>
          <div>
            <div class="theme-swatch" data-theme="theme-blueprint" style="background:#F5F3EE; border:1px solid #d8d0be"></div>
            <div class="theme-name">极简白皮书</div>
          </div>
        </div>
      </div>

      <div class="theme-set" id="set-law">
        <div class="theme-grid">
          <div>
            <div class="theme-swatch" data-theme="theme-dossier" style="background:linear-gradient(160deg,#151210,#0C0A08)"></div>
            <div class="theme-name">卷宗黑金</div>
          </div>
          <div>
            <div class="theme-swatch" data-theme="theme-ivory" style="background:#F3EEE2; border:1px solid #d8d0be"></div>
            <div class="theme-name">象牙判例</div>
          </div>
        </div>
      </div>
    </div>

    <div class="field">
      <label>徽标 · Badge Mark</label>
      <div class="mark-toggle">
        <button class="mark-btn active" data-mark="on">显示</button>
        <button class="mark-btn" data-mark="off">隐藏</button>
      </div>
    </div>

    <button class="export-btn" id="exportBtn">下载高清卡片 · PNG</button>
    <div class="hint">卡片文字可直接点击编辑。切换「AI 科技」/「法律」圈层查看专属配色与版式。导出约 1500×2000px，适用于公众号 / 小红书 / 朋友圈。</div>
  </div>

  <!-- ============ CARD STAGE ============ -->
  <div class="stage">
    <div class="card-frame">
      <div class="card theme-matrix" id="card">
        <div class="frame-line"></div>

        <div class="eyebrow">
          <span id="seriesLabel">SYS.LOG // 09</span>
        </div>

        <div class="quote-zone">
          <div class="quote-text" id="quoteText" contenteditable="true" spellcheck="false">预测未来最好的方式，就是把它创造出来。</div>
        </div>

        <div class="footer">
          <div class="attribution">
            <div class="rule"></div>
            <div class="author" id="authorText" contenteditable="true" spellcheck="false">艾伦·凯</div>
            <div class="role" id="roleText" contenteditable="true" spellcheck="false">ALAN KAY · 计算机科学家</div>
          </div>
          <div class="badge" id="badgeMark">AI</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const card = document.getElementById('card');

const presets = {
  ai: {
    quote:'预测未来最好的方式，就是把它创造出来。',
    author:'艾伦·凯',
    role:'ALAN KAY · 计算机科学家',
    series:'SYS.LOG // 09',
    badge:'AI'
  },
  law: {
    quote:'迟到的正义，即是非正义。',
    author:'威廉·格拉德斯通',
    role:'W. E. GLADSTONE · 法学格言',
    series:'NO. 2026-CV-0142',
    badge:'§'
  }
};

const $ = id => document.getElementById(id);

const bind = (inputId, targetId) => {
  const input = $(inputId), target = $(targetId);
  input.addEventListener('input', () => target.innerText = input.value);
};
bind('inputQuote','quoteText');
bind('inputAuthor','authorText');
bind('inputRole','roleText');
bind('inputSeries','seriesLabel');

const bindBack = (targetId, inputId) => {
  const target = $(targetId), input = $(inputId);
  target.addEventListener('input', () => input.value = target.innerText);
};
bindBack('quoteText','inputQuote');
bindBack('authorText','inputAuthor');
bindBack('roleText','inputRole');

// category tabs
document.querySelectorAll('.cat-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.theme-set').forEach(s=>s.classList.remove('active'));
    $('set-'+btn.dataset.cat).classList.add('active');

    const p = presets[btn.dataset.cat];
    $('inputQuote').value = p.quote; $('quoteText').innerText = p.quote;
    $('inputAuthor').value = p.author; $('authorText').innerText = p.author;
    $('inputRole').value = p.role; $('roleText').innerText = p.role;
    $('inputSeries').value = p.series; $('seriesLabel').innerText = p.series;
    $('badgeMark').innerText = p.badge;

    const firstSwatch = $('set-'+btn.dataset.cat).querySelector('.theme-swatch');
    document.querySelectorAll('.theme-swatch').forEach(s=>s.classList.remove('active'));
    firstSwatch.classList.add('active');
    card.className = 'card ' + firstSwatch.dataset.theme;
  });
});

// theme switching
document.querySelectorAll('.theme-swatch').forEach(sw=>{
  sw.addEventListener('click', ()=>{
    document.querySelectorAll('.theme-swatch').forEach(s=>s.classList.remove('active'));
    sw.classList.add('active');
    card.className = 'card ' + sw.dataset.theme;
  });
});

// badge toggle
document.querySelectorAll('.mark-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.mark-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    $('badgeMark').style.display = btn.dataset.mark === 'on' ? 'flex' : 'none';
  });
});

// export
$('exportBtn').addEventListener('click', ()=>{
  const btn = $('exportBtn');
  btn.innerText = '正在生成…';
  html2canvas(card, { scale: 3.33, backgroundColor: null, useCORS: true }).then(canvas=>{
    const link = document.createElement('a');
    link.download = '名言卡片.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    btn.innerText = '下载高清卡片 · PNG';
  }).catch(()=>{
    btn.innerText = '生成失败，请重试';
    setTimeout(()=>btn.innerText='下载高清卡片 · PNG', 1800);
  });
});
</script>

</body>
</html>
